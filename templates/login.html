<!DOCTYPE html>
<html>
<head>
    <title>Exam Guard Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        h1 { color: #333; margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        .footer { margin-top: 20px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>🎓 Exam Guard</h1>
        <p>Please identify yourself to begin.</p>
        
        <form action="/verify" method="post">
            <input type="text" name="student_id" placeholder="Enter Matric / Student ID" required>
            <button type="submit">Verify Face & Start Exam</button>
        </form>
        
        <div class="footer">Secure AI Proctoring System</div>
    </div>

</body>
</html>
